<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的游戏</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #fff);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .score {
            font-size: 48px;
            font-weight: bold;
            color: #e94560;
            margin: 20px 0;
        }
        .click-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .click-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.3);
        }
        .user-info {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔥 点击游戏</h1>
        <div class="score" id="score">0</div>
        <button class="click-btn" id="clickBtn" onclick="handleClick()">点击!</button>
        <div class="user-info" id="userInfo">加载中...</div>
    </div>

    <script>
        // 初始化 Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 设置主题色
        tg.setHeaderColor(tg.themeParams.bg_color || '#1a1a2e');

        // 显示用户信息
        const user = tg.initDataUnsafe.user;
        const userInfoEl = document.getElementById('userInfo');
        if (user) {
            userInfoEl.textContent = `玩家: ${user.first_name}${user.last_name ? ' ' + user.last_name : ''}`;
        } else {
            userInfoEl.textContent = '游客模式';
        }

        // 游戏逻辑
        let score = parseInt(localStorage.getItem('tg_game_score') || '0');
        document.getElementById('score').textContent = score;

        function handleClick() {
            score++;
            document.getElementById('score').textContent = score;
            localStorage.setItem('tg_game_score', score);

            // 震动反馈（手机支持）
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // 设置主按钮（底部按钮）
        tg.MainButton.setText('分享成绩');
        tg.MainButton.onClick(() => {
            const text = `我在点击游戏中得了 ${score} 分！来挑战我吧！`;
            const url = `https://t.me/share/url?url=${encodeURIComponent('https://t.me/' + (user ? user.username : 'your_bot'))}&text=${encodeURIComponent(text)}`;
            tg.openTelegramLink(url);
        });

        // 分数大于0时显示分享按钮
        if (score > 0) {
            tg.MainButton.show();
        }
    </script>
</body>
</html>
