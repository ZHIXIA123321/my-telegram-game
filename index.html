<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>点击大作战</title>
 <script src="https://telegram.org/js/telegram-web-app.js"></script>
 <script src="https://unityads.unity3d.com/ads.js"></script>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
 color: #fff;
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 height: 100vh;
 overflow: hidden;
 user-select: none;
 }
 .game-container {
 text-align: center;
 padding: 20px;
 width: 100%;
 max-width: 400px;
 }
 .header {
 margin-bottom: 20px;
 }
 h1 {
 font-size: 28px;
 margin-bottom: 5px;
 background: linear-gradient(90deg, #e94560, #ff6b6b);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 }
 .subtitle {
 font-size: 14px;
 opacity: 0.7;
 }
 .stats {
 display: flex;
 justify-content: space-around;
 margin: 20px 0;
 padding: 15px;
 background: rgba(255,255,255,0.05);
 border-radius: 15px;
 }
 .stat-item {
 text-align: center;
 }
 .stat-value {
 font-size: 32px;
 font-weight: bold;
 color: #e94560;
 }
 .stat-label {
 font-size: 12px;
 opacity: 0.6;
 margin-top: 5px;
 }
 .click-btn {
 width: 180px;
 height: 180px;
 border-radius: 50%;
 border: none;
 background: linear-gradient(135deg, #e94560, #ff6b6b);
 color: white;
 font-size: 28px;
 font-weight: bold;
 cursor: pointer;
 box-shadow: 0 15px 40px rgba(233, 69, 96, 0.4);
 transition: transform 0.1s, box-shadow 0.1s;
 margin: 20px 0;
 }
 .click-btn:active {
 transform: scale(0.92);
 box-shadow: 0 8px 20px rgba(233, 69, 96, 0.3);
 }
 .click-btn:disabled {
 opacity: 0.5;
 cursor: not-allowed;
 }
 .ad-btn {
 width: 100%;
 padding: 15px;
 margin-top: 15px;
 border: 2px dashed #ffd700;
 background: rgba(255, 215, 0, 0.1);
 color: #ffd700;
 border-radius: 12px;
 font-size: 16px;
 cursor: pointer;
 transition: all 0.3s;
 }
 .ad-btn:hover {
 background: rgba(255, 215, 0, 0.2);
 }
 .ad-btn:disabled {
 opacity: 0.3;
 cursor: not-allowed;
 }
 .progress-bar {
 width: 100%;
 height: 8px;
 background: rgba(255,255,255,0.1);
 border-radius: 4px;
 margin: 15px 0;
 overflow: hidden;
 }
 .progress-fill {
 height: 100%;
 background: linear-gradient(90deg, #e94560, #ffd700);
 border-radius: 4px;
 transition: width 0.3s;
 }
 .message {
 font-size: 14px;
 padding: 10px;
 border-radius: 8px;
 margin: 10px 0;
 display: none;
 }
 .message.show {
 display: block;
 }
 .message.success {
 background: rgba(0, 255, 0, 0.1);
 color: #4ade80;
 }
 .message.info {
 background: rgba(255, 215, 0, 0.1);
 color: #ffd700;
 }
 .floating-text {
 position: absolute;
 font-size: 24px;
 font-weight: bold;
 color: #ffd700;
 pointer-events: none;
 animation: floatUp 1s ease-out forwards;
 }
 @keyframes floatUp {
 0% { opacity: 1; transform: translateY(0) scale(1); }
 100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
 }
 </style>
</head>
